# =============================================================================
# A 级 Atomic Skill 模板（分析步骤）
# =============================================================================
# 适用：atomic 单职责 skill，但 SQL 实质丰富（≥3 步或 ≥200 行 + ≥1 stdlib）。
# 参考: backend/skills/atomic/input_to_frame_latency.skill.yaml (5 steps, 425 行)

name: {{SKILL_ID}}
version: "1.0"
type: atomic                           # 关键：A 级是真 atomic
category: {{DOMAIN}}
tier: A

meta:
  display_name: "{{显示名}}"
  description: "{{一句话说明}}"
  icon: "{{material-icon}}"
  tags: [{{tag1}}, {{tag2}}]

# A 级强制 ≥1 stdlib 模块
prerequisites:
  modules:
    - {{stdlib_module_1}}              # 必须 ≥1

inputs: []

steps:
  - id: query
    type: atomic
    name: "{{查询说明}}"
    display:
      level: detail
      layer: list
      title: "{{标题}}"
      columns:                         # A 级强制 columns 完整定义
        - name: id
          label: "ID"
          type: number
        - name: name
          label: "名称"
          type: string
        - name: value
          label: "数值"
          type: number
          format: compact
    sql: |
      SELECT
        id,
        name,
        value
      FROM {{stdlib_table}}
      WHERE {{condition}}
      ORDER BY value DESC
      LIMIT 100

  # A 级允许 1-3 个步骤。若需要 ≥5 步骤，请用 composite_S_template
  - id: aggregation
    type: atomic
    name: "{{聚合}}"
    display:
      level: summary
      layer: list
      title: "{{摘要}}"
      columns:
        - name: total
          label: "总数"
          type: number
        - name: avg_ms
          label: "平均(ms)"
          type: duration
          format: duration_ms
    sql: |
      SELECT
        COUNT(*) AS total,
        AVG(value) AS avg_ms
      FROM {{stdlib_table}}
