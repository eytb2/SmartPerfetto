name: lock_contention_in_range
version: "1.0"
type: atomic
category: performance
tier: A

meta:
  display_name: "锁竞争分析 (区间)"
  description: "分析指定时间范围内的锁竞争情况"
  icon: "lock"
  tags: [lock, contention, performance, atomic]

prerequisites:
  required_tables:
    - thread_state
    - android_monitor_contention
  modules:
    - android.monitor_contention
    - slices.with_context

inputs:
  - name: start_ts
    type: timestamp
    required: true
  - name: end_ts
    type: timestamp
    required: true
  - name: package
    type: string
    required: false

steps:
  # Step 1: Java Monitor 锁竞争
  - id: monitor_contentions
    type: atomic
    name: "Java Monitor 锁竞争"
    display:
      level: detail
      title: "Java Monitor 锁竞争"
      columns:
        - name: blocking_method
          label: "持锁方法"
          type: string
        - name: blocking_thread_name
          label: "持锁线程"
          type: string
        - name: blocked_method
          label: "阻塞方法"
          type: string
        - name: blocked_thread_name
          label: "阻塞线程"
          type: string
        - name: main_blocked
          label: "主线程阻塞"
          type: boolean
        - name: wait_ms
          label: "等待时长"
          type: duration
          format: duration_ms
          unit: ms
        - name: waiter_count
          label: "等待数"
          type: number
        - name: lock_type
          label: "锁类型"
          type: string
    sql: |
      SELECT
        short_blocking_method as blocking_method,
        blocking_thread_name,
        short_blocked_method as blocked_method,
        blocked_thread_name,
        is_blocked_thread_main as main_blocked,
        ROUND(dur / 1e6, 2) as wait_ms,
        waiter_count,
        'java_monitor' as lock_type
      FROM android_monitor_contention
      WHERE ts >= ${start_ts}
        AND ts < ${end_ts}
        AND (process_name GLOB '${package}*' OR '${package}' = '')
        AND dur >= 1000000
      ORDER BY dur DESC
    save_as: monitor_contentions
    optional: true

  # Step 1b: Upstream AndroidLockContention owner-thread provenance
  - id: owner_contentions
    type: atomic
    name: "持锁线程归因"
    optional: true
    display:
      level: detail
      title: "持锁线程归因（Monitor + ART Lock contention）"
      columns:
        - name: source
          label: "来源"
          type: string
        - name: process_name
          label: "进程"
          type: string
        - name: lock_name
          label: "锁/方法"
          type: string
        - name: lock_type
          label: "锁类型"
          type: string
        - name: blocked_thread_name
          label: "等待线程"
          type: string
        - name: blocking_thread_name
          label: "持锁线程"
          type: string
        - name: owner_tid
          label: "Owner TID"
          type: number
        - name: owner_thread_state
          label: "持锁线程状态"
          type: string
        - name: owner_blocked_function
          label: "持锁线程阻塞函数"
          type: string
        - name: wait_ms
          label: "等待时长"
          type: duration
          format: duration_ms
          unit: ms
        - name: owner_state_ms
          label: "状态重叠时长"
          type: duration
          format: duration_ms
          unit: ms
    sql: |
      WITH
      raw_art_contentions AS (
        SELECT
          printf('art:%d', s.id) AS event_key,
          s.id,
          s.ts,
          s.dur,
          s.name,
          s.utid,
          cast_int!(STR_SPLIT(STR_SPLIT(s.name, '(owner tid: ', 1), ')', 0)) AS owner_tid
        FROM thread_slice AS s
        WHERE s.name GLOB 'Lock contention*(owner tid: *)*'
      ),
      art_contentions AS (
        SELECT
          r.event_key,
          r.id,
          r.ts,
          r.dur,
          p.name AS process_name,
          r.name AS lock_name,
          r.owner_tid,
          owner_thread.utid AS owner_utid,
          blocked_thread.name AS blocked_thread_name,
          owner_thread.name AS blocking_thread_name,
          CASE
            WHEN r.name GLOB '*monitor*' THEN 'monitor'
            WHEN r.name GLOB '*mutex*' THEN 'mutex'
            ELSE 'art_lock'
          END AS lock_type,
          0 AS is_monitor
        FROM raw_art_contentions AS r
        JOIN thread AS blocked_thread
          ON r.utid = blocked_thread.utid
        LEFT JOIN process AS p
          ON blocked_thread.upid = p.upid
        LEFT JOIN thread AS owner_thread
          ON owner_thread.tid = r.owner_tid
          AND (owner_thread.upid = blocked_thread.upid OR r.owner_tid = 0)
        WHERE owner_thread.utid IS NOT NULL
          AND r.dur > 0
      ),
      monitor_contentions AS (
        SELECT
          printf('monitor:%d', id) AS event_key,
          id,
          ts,
          dur,
          process_name,
          COALESCE(short_blocking_method, blocking_method, 'Unknown Lock') AS lock_name,
          blocking_tid AS owner_tid,
          blocking_utid AS owner_utid,
          blocked_thread_name,
          blocking_thread_name,
          'monitor' AS lock_type,
          1 AS is_monitor
        FROM android_monitor_contention
        WHERE blocking_utid IS NOT NULL
          AND dur > 0
      ),
      all_lock_contentions AS (
        SELECT * FROM art_contentions
        UNION ALL
        SELECT * FROM monitor_contentions
      ),
      owner_states AS (
        SELECT
          c.event_key,
          ts.state AS owner_thread_state,
          ts.blocked_function AS owner_blocked_function,
          SUM(MIN(ts.ts + ts.dur, c.ts + c.dur) - MAX(ts.ts, c.ts)) AS owner_state_dur
        FROM all_lock_contentions AS c
        JOIN thread_state AS ts
          ON ts.utid = c.owner_utid
          AND ts.ts < c.ts + c.dur
          AND ts.ts + ts.dur > c.ts
        GROUP BY c.event_key, ts.state, ts.blocked_function
      ),
      ranked_owner_states AS (
        SELECT
          *,
          ROW_NUMBER() OVER (PARTITION BY event_key ORDER BY owner_state_dur DESC) AS rn
        FROM owner_states
      )
      SELECT
        CASE WHEN c.is_monitor THEN 'monitor_contention' ELSE 'art_lock_contention' END AS source,
        c.process_name,
        c.lock_name,
        c.lock_type,
        c.blocked_thread_name,
        c.blocking_thread_name,
        c.owner_tid,
        COALESCE(ros.owner_thread_state, 'unknown') AS owner_thread_state,
        ros.owner_blocked_function,
        ROUND(c.dur / 1e6, 2) AS wait_ms,
        ROUND(COALESCE(ros.owner_state_dur, 0) / 1e6, 2) AS owner_state_ms
      FROM all_lock_contentions AS c
      LEFT JOIN ranked_owner_states AS ros
        ON ros.event_key = c.event_key
        AND ros.rn = 1
      WHERE c.ts >= ${start_ts}
        AND c.ts < ${end_ts}
        AND (c.process_name GLOB '${package}*' OR '${package}' = '')
        AND c.dur >= 1000000
      ORDER BY c.dur DESC
      LIMIT 100
    save_as: owner_contentions

  # Step 2: Futex 等待 (pthread_mutex, ReentrantLock 底层实现)
  - id: futex_waits
    type: atomic
    name: "Futex 等待"
    display:
      level: detail
      title: "Futex/Mutex 等待"
      columns:
        - name: thread_name
          label: "线程"
          type: string
        - name: blocked_function
          label: "阻塞函数"
          type: string
        - name: wait_ms
          label: "等待时长"
          type: duration
          format: duration_ms
          unit: ms
        - name: process_name
          label: "进程"
          type: string
        - name: lock_type
          label: "锁类型"
          type: string
        - name: is_main_thread
          label: "主线程"
          type: boolean
    sql: |
      SELECT
        t.name as thread_name,
        ts.blocked_function,
        ROUND(ts.dur / 1e6, 2) as wait_ms,
        p.name as process_name,
        CASE
          WHEN ts.blocked_function GLOB '*futex*' THEN 'futex'
          WHEN ts.blocked_function GLOB '*mutex*' THEN 'pthread_mutex'
          WHEN ts.blocked_function GLOB '*rwlock*' THEN 'rwlock'
          WHEN ts.blocked_function GLOB '*sem*' THEN 'semaphore'
          WHEN ts.blocked_function GLOB '*cond*' THEN 'condition_var'
          ELSE 'other'
        END as lock_type,
        t.tid = p.pid as is_main_thread
      FROM thread_state ts
      JOIN thread t ON ts.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE ts.ts >= ${start_ts}
        AND ts.ts < ${end_ts}
        AND (p.name GLOB '${package}*' OR '${package}' = '')
        AND ts.state IN ('S', 'D')
        AND ts.dur >= 1000000
        AND (ts.blocked_function GLOB '*futex*'
             OR ts.blocked_function GLOB '*mutex*'
             OR ts.blocked_function GLOB '*rwlock*'
             OR ts.blocked_function GLOB '*sem_*'
             OR ts.blocked_function GLOB '*cond_*')
      ORDER BY ts.dur DESC
    save_as: futex_waits
    optional: true

  # Step 3: 锁竞争汇总
  - id: lock_summary
    type: atomic
    name: "锁竞争汇总"
    optional: true
    display:
      level: summary
      title: "锁竞争汇总"
      columns:
        - name: java_monitor_count
          label: "Java锁次数"
          type: number
          format: compact
        - name: futex_mutex_count
          label: "Futex次数"
          type: number
          format: compact
        - name: total_contentions
          label: "总竞争次数"
          type: number
          format: compact
        - name: java_monitor_wait_ms
          label: "Java锁等待"
          type: duration
          format: duration_ms
          unit: ms
        - name: futex_mutex_wait_ms
          label: "Futex等待"
          type: duration
          format: duration_ms
          unit: ms
        - name: total_wait_ms
          label: "总等待"
          type: duration
          format: duration_ms
          unit: ms
        - name: max_monitor_wait_ms
          label: "最大Java锁等待"
          type: duration
          format: duration_ms
          unit: ms
        - name: main_thread_blocked_count
          label: "主线程阻塞"
          type: number
          format: compact
    sql: |
      WITH
      monitor_stats AS (
        SELECT
          COUNT(*) as monitor_count,
          COALESCE(SUM(dur), 0) as monitor_total_ns,
          COALESCE(MAX(dur), 0) as monitor_max_ns,
          SUM(CASE WHEN is_blocked_thread_main THEN 1 ELSE 0 END) as monitor_main_blocked
        FROM android_monitor_contention
        WHERE ts >= ${start_ts}
          AND ts < ${end_ts}
          AND (process_name GLOB '${package}*' OR '${package}' = '')
      ),
      futex_stats AS (
        SELECT
          COUNT(*) as futex_count,
          COALESCE(SUM(ts.dur), 0) as futex_total_ns,
          COALESCE(MAX(ts.dur), 0) as futex_max_ns,
          SUM(CASE WHEN t.tid = p.pid THEN 1 ELSE 0 END) as futex_main_blocked
        FROM thread_state ts
        JOIN thread t ON ts.utid = t.utid
        JOIN process p ON t.upid = p.upid
        WHERE ts.ts >= ${start_ts}
          AND ts.ts < ${end_ts}
          AND (p.name GLOB '${package}*' OR '${package}' = '')
          AND ts.state IN ('S', 'D')
          AND ts.dur >= 1000000
          AND (ts.blocked_function GLOB '*futex*'
               OR ts.blocked_function GLOB '*mutex*')
      )
      SELECT
        (SELECT monitor_count FROM monitor_stats) as java_monitor_count,
        (SELECT futex_count FROM futex_stats) as futex_mutex_count,
        (SELECT monitor_count FROM monitor_stats) + (SELECT futex_count FROM futex_stats) as total_contentions,
        ROUND((SELECT monitor_total_ns FROM monitor_stats) / 1e6, 2) as java_monitor_wait_ms,
        ROUND((SELECT futex_total_ns FROM futex_stats) / 1e6, 2) as futex_mutex_wait_ms,
        ROUND(((SELECT monitor_total_ns FROM monitor_stats) + (SELECT futex_total_ns FROM futex_stats)) / 1e6, 2) as total_wait_ms,
        ROUND(((SELECT monitor_max_ns FROM monitor_stats) + 0) / 1e6, 2) as max_monitor_wait_ms,
        ROUND(((SELECT futex_max_ns FROM futex_stats) + 0) / 1e6, 2) as max_futex_wait_ms,
        (SELECT monitor_main_blocked FROM monitor_stats) + (SELECT futex_main_blocked FROM futex_stats) as main_thread_blocked_count
    save_as: summary

output:
  format: structured
  fields:
    - name: monitor_contentions
      description: "Java Monitor 锁竞争事件"
    - name: owner_contentions
      description: "持锁线程归因事件（Monitor + ART Lock contention）"
    - name: futex_waits
      description: "Futex/pthread_mutex 等待事件"
    - name: summary
      description: "锁竞争汇总统计"
