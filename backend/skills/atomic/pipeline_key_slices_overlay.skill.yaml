# =============================================================================
# 管线关键 Slice 时间线 (Pipeline Key Slices Overlay)
# =============================================================================
# 查询管线关键 Slice 的实际 ts/dur 数据用于时间线 overlay。
# 教学模块检测到渲染管线后调用此 skill，将关键 Slice 高亮为 Perfetto 时间线
# overlay，帮助用户对照理论管线图与实际 trace 数据。
# =============================================================================

name: pipeline_key_slices_overlay
version: "1.0"
type: atomic
category: pipeline
tier: B

meta:
  display_name: "管线关键 Slice 时间线"
  description: "查询管线关键 Slice 的实际 ts/dur 数据用于时间线 overlay"
  icon: "timeline"
  tags: [pipeline, teaching, overlay, timeline, atomic]

inputs:
  - name: slice_names
    type: string
    required: true
    description: "SQL IN 列表格式的 Slice 名称，如 'Choreographer#doFrame','DrawFrame','syncFrameState'"
  - name: package
    type: string
    required: false
    description: "可选包名/进程名前缀；为空时不过滤 App 进程，始终保留 SurfaceFlinger/system_server"
  - name: start_ts
    type: number
    required: false
    description: "可选时间窗起点(ns)，用于把 overlay 限定在 selection 或 visible window"
  - name: end_ts
    type: number
    required: false
    description: "可选时间窗终点(ns)，用于把 overlay 限定在 selection 或 visible window"

steps:
  - id: pipeline_key_slices_overlay
    type: atomic
    name: "管线关键 Slice 查询"
    display:
      level: hidden
      layer: deep
      title: "管线关键 Slice"
      columns:
        - name: ts
          type: timestamp
          unit: ns
        - name: dur
          type: duration
          unit: ns
        - name: slice_name
          type: string
        - name: dur_ms
          type: number
        - name: thread_name
          type: string
        - name: process_name
          type: string
        - name: track_id
          type: number
        - name: utid
          type: number
        - name: pipeline_stage
          type: string
        - name: description
          type: string
    sql: |
      SELECT
        s.ts,
        s.dur,
        s.name AS slice_name,
        ROUND(CAST(s.dur AS REAL) / 1000000.0, 2) AS dur_ms,
        t.name AS thread_name,
        p.name AS process_name,
        s.track_id,
        t.utid,
        CASE
          WHEN lower(s.name) LIKE '%choreographer%doframe%' OR lower(s.name) LIKE '%traversal%' THEN 'app_frame'
          WHEN t.name = 'RenderThread' OR lower(s.name) LIKE '%drawframe%' OR lower(s.name) LIKE '%syncframestate%' THEN 'render_thread'
          WHEN lower(s.name) LIKE '%queuebuffer%' OR lower(s.name) LIKE '%dequeuebuffer%' OR lower(s.name) LIKE '%blast%' OR lower(s.name) LIKE '%transaction%' THEN 'buffer_queue_transaction'
          WHEN p.name LIKE '%surfaceflinger%' OR lower(s.name) LIKE '%latchbuffer%' THEN 'surfaceflinger_composition'
          WHEN t.name LIKE '%HWC%' OR lower(s.name) LIKE '%present%' THEN 'present'
          ELSE 'other'
        END AS pipeline_stage,
        '' AS description
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE s.name IN (${slice_names})
        AND s.dur > 0
        AND (${start_ts|NULL} IS NULL OR s.ts >= ${start_ts|NULL})
        AND (${end_ts|NULL} IS NULL OR s.ts < ${end_ts|NULL})
        AND (
          '${package}' = ''
          OR p.name GLOB '${package}*'
          OR p.name LIKE '%surfaceflinger%'
          OR p.name = 'system_server'
        )
      ORDER BY s.ts
      LIMIT 200
